<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>downloading app...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      min-height: 100vh;
      background: #ffffff;
      color: #111827;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    p {
      font-size: 1.125rem;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="spinner"></div>
  <p>Downloading App...</p>

  <script>
    // Extract all non-empty query params
    var params = {};
    window.location.search.slice(1).split('&').forEach(function (pair) {
      if (!pair) return;
      var idx = pair.indexOf('=');
      var key = idx === -1 ? pair : pair.slice(0, idx);
      var val = idx === -1 ? '' : decodeURIComponent(pair.slice(idx + 1).replace(/\+/g, ' '));
      if (key && val.trim()) params[key] = val.trim();
    });

    function triggerDownload(url, fileName) {
      var a = document.createElement('a');
      a.href = url;
      if (fileName) a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    fetch('../config.json')
      .then(function (r) { return r.json(); })
      .then(function (config) {
        fetch(config.endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params)
        })
          .catch(function () { /* silent fail */ })
          .finally(function () {
            triggerDownload(config.downloadUrl, config.downloadFileName);
          });
      });
  </script>
</body>

</html>
